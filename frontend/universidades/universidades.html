<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Universidades - SkillTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="universidades.css">
</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div>
            <div class="profile">
                <img src="https://i.pravatar.cc/150?img=15" alt="Usuario">
                 <h3 id="nombreUsuario">Usuario</h3>
                 <p id="rolUsuario" style="color:#cbd5ff; font-size:13px;">Rol</p>
            </div>

            <ul class="nav-links">
               <li><a href="../index/index.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="../registro/registro.html"><i class="fas fa-users"></i> Usuarios</a></li>
                <li><a href="#" class="active"><i class="fas fa-university"></i> Universidades</a></li>
                 <li><a href="../carreras/carreras.html"><i class="fas fa-graduation-cap"></i> Carreras</a></li>
                 <li><a href="../cursos/cursos.html"><i class="fas fa-book"></i> Cursos</a></li>
            </ul>
        </div>

        <div class="logout">
            <a href="../login/login.html"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <div class="topbar">
            <h1>Gestión de Universidades</h1>
        </div>

        <div class="content-grid">

            <!-- FORMULARIO -->
            <div class="card-box">
                <h2>Registrar Universidad</h2>

                <form id="universidadForm">
                    <div class="input-group">
                        <label>Nombre de la Universidad</label>
                        <input type="text" id="nombreUniversidad" required>
                    </div>

                    <button type="submit">
                        <i class="fas fa-plus-circle"></i> Registrar Universidad
                    </button>
                </form>
            </div>

            <!-- LISTA -->
            <div class="card-box">
                <h2>Universidades Registradas</h2>

                <ul id="listaUniversidades" class="lista">
                </ul>
            </div>

        </div>

    </div>

</div>

<script>
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario) {
    window.location.href = "../login/login.html";
}
// Mostrar nombre
document.getElementById("nombreUsuario").innerText = usuario.nombre;
// Mostrar rol
document.getElementById("rolUsuario").innerText =
    usuario.rol.charAt(0).toUpperCase() + usuario.rol.slice(1);
// Cerrar sesión
function logout(){
    localStorage.removeItem("usuario");
    window.location.href = "../login/login.html";
}

async function cargarUniversidades(){
    const res = await fetch("http://localhost:3000/universidades");
    const data = await res.json();

    const lista = document.getElementById("listaUniversidades");
    lista.innerHTML = "";

    data.forEach(u=>{
        lista.innerHTML += `
            <li>
                ${u.nombre}
                <button onclick="eliminarUniversidad('${u._id}')">
                    <i class="fas fa-trash"></i>
                </button>
            </li>
        `;
    });
}

document.getElementById("universidadForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const nombre = document.getElementById("nombreUniversidad").value;

    const res = await fetch("http://localhost:3000/universidades",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ nombre })
    });

    const data = await res.json();
    alert(data.mensaje || data.error);

    cargarUniversidades();
});

async function eliminarUniversidad(id){
    if(!confirm("¿Eliminar universidad?")) return;

    await fetch(`http://localhost:3000/universidades/${id}`,{
        method:"DELETE"
    });

    cargarUniversidades();
}

cargarUniversidades();

</script>

</body>
</html>
