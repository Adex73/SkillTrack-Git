<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Cursos - SkillTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="mis-cursos.css">
</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div>
            <div class="profile">
                <img src="https://i.pravatar.cc/150?img=12">
                <h3 id="nombreUsuario">Usuario</h3>
                <p id="rolUsuario" style="color:#cbd5ff; font-size:13px;">Rol</p>
            </div>

            <ul class="nav-links">
                <li><a href="../index/index.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="#" class="active"><i class="fas fa-book"></i> Mis Cursos</a></li>
                <li><a href="../registro/registro.html"><i class="fas fa-users"></i> Usuarios</a></li>
            </ul>
        </div>

        <div class="logout">
            <a href="../login/login.html" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </a>
        </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <div class="topbar">
            <h1>Mis Cursos</h1>
        </div>

        <!-- GRID DINÁMICO -->
        <div class="courses-grid" id="coursesGrid">
            <!-- Cursos cargados dinámicamente -->
        </div>

    </div>

</div>

<script>


// 🔐 Obtener usuario del login
const usuario = JSON.parse(localStorage.getItem("usuario"));

console.log("Usuario completo:", usuario);
console.log("ID usuario:", usuario.id);

if (!usuario) {
    window.location.href = "../login/login.html";
}

// Mostrar datos del usuario
document.getElementById("nombreUsuario").innerText = usuario.nombre;
document.getElementById("rolUsuario").innerText =
    usuario.rol.charAt(0).toUpperCase() + usuario.rol.slice(1);


// 🔥 CARGAR CURSOS DEL PROFESOR Y ALUMNOS
async function cargarCursos() {
    try {

        let url = "";

        // 🔥 Detectar rol
        if (usuario.rol === "profesor") {
            url = `http://localhost:3000/cursos/profesor/${usuario.id}`;
        } 
        else if (usuario.rol === "estudiante") {
            url = `http://localhost:3000/cursos/estudiante/${usuario.id}`;
        }

        const res = await fetch(url);
        const cursos = await res.json();

        const grid = document.getElementById("coursesGrid");
        grid.innerHTML = "";

        if (!cursos.length) {
            grid.innerHTML = "<p>No tienes cursos asignados.</p>";
            return;
        }

        cursos.forEach(curso => {

            const card = document.createElement("div");
            card.classList.add("course-card");

            card.innerHTML = `
                <div class="course-header">
                    <h3>${curso.nombre}</h3>
                    <span class="grupo">${curso.grupo}</span>
                </div>

                <div class="course-body">
                    <p><i class="fas fa-user"></i> 
                        Profesor: ${curso.profesorId?.nombre || "N/A"}
                    </p>
                    <p><i class="fas fa-graduation-cap"></i> 
                        ${curso.carreraId?.nombre || "Sin carrera"}
                    </p>
                </div>

                <div class="course-footer">
                    <button class="btn-ver-curso" data-curso='${JSON.stringify(curso)}'>
                        <i class="fas fa-eye"></i> Ver Curso
                    </button>
                </div>
            `;

            const boton = card.querySelector(".btn-ver-curso");

            boton.addEventListener("click", () => {
                const cursoData = JSON.parse(boton.getAttribute("data-curso"));
                verCurso(cursoData);
            });

            grid.appendChild(card);
        });

    } catch (error) {
        console.error("Error al cargar cursos:", error);
    }
}


// 🔍 VER CURSO
function verCurso(curso) {
    // Guardar ID
    localStorage.setItem("cursoId", curso._id);

    // Guardar TODO el curso (recomendado)
    localStorage.setItem("cursoSeleccionado", JSON.stringify(curso));

    // Redirigir
    window.location.href = "datos-curso.html";
}


// 🚪 LOGOUT
function logout() {
    localStorage.removeItem("usuario");
}


// 🚀 Ejecutar al cargar
cargarCursos();

</script>

</body>
</html>
