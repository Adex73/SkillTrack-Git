<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso - SkillTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="datos-curso.css">
</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div>
            <div class="profile">
                <img src="https://i.pravatar.cc/150?img=12">
                <h3 id="nombreUsuario">Usuario</h3>
                <p id="rolUsuario" style="color:#cbd5ff; font-size:13px;">Rol</p>
            </div>

            <ul class="nav-links">
                <li><a href="../mis-cursos/mis-cursos.html"><i class="fas fa-arrow-left"></i> Volver</a></li>
                <li><a href="#" class="active"><i class="fas fa-stream"></i> Contenido</a></li>
                <li><a href="../tareas/tareas.html"><i class="fas fa-tasks"></i> Tareas</a></li>
                <li><a href="../calificaciones/calificaciones.html"><i class="fas fa-chart-bar"></i> Calificaciones</a></li>
                <li><a href="../reportes/reportes.html"><i class="fas fa-chart-line"></i> Reportes</a></li>
                <li><a href="../inscripciones/inscripciones.html"><i class="fas fa-user-plus"></i> Inscripciones</a></li>
            </ul>
        </div>

        <div class="logout">
            <a href="../login/login.html" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </a>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main-content">

        <div class="course-banner">
            <div>
                <h1 id="cursoNombre">Curso</h1>
                <p id="cursoInfo">Grupo • Carrera</p>
                <p id="cursoProfesor">Profesor</p>
            </div>
        </div>

        <div class="course-content" id="contenidoCurso"></div>

    </div>

</div>

<script>

// ============================
// 🔐 USUARIO
// ============================
const usuario = JSON.parse(localStorage.getItem("usuario"));
const curso = JSON.parse(localStorage.getItem("cursoSeleccionado"));
const cursoId = localStorage.getItem("cursoId");

if (!usuario || !cursoId) {
    window.location.href = "../login/login.html";
}

// UI usuario
document.getElementById("nombreUsuario").innerText = usuario.nombre;
document.getElementById("rolUsuario").innerText =
    usuario.rol.charAt(0).toUpperCase() + usuario.rol.slice(1);

// UI curso
if (curso) {
    document.getElementById("cursoNombre").innerText = curso.nombre;
    document.getElementById("cursoInfo").innerText =
        `${curso.grupo} • ${curso.carreraId?.nombre || "Sin carrera"}`;
    document.getElementById("cursoProfesor").innerText =
        `Profesor: ${usuario.nombre}`;
}

const contenedor = document.getElementById("contenidoCurso");

let contenidoGlobal = null;
let moduloAbierto = null; // 🔥 clave PRO


// ============================
// 🔥 CARGAR CONTENIDO
// ============================
async function cargarEstructura() {

    await fetch(`http://localhost:3000/contenido/${cursoId}`, {
        method: "POST"
    });

    const res = await fetch(`http://localhost:3000/contenido/${cursoId}`);
    const data = await res.json();

    contenidoGlobal = data;

    renderEstructura();
}


// ============================
// 🎯 RENDER
// ============================
function renderEstructura() {

    contenedor.innerHTML = "";

    contenidoGlobal.modulos.forEach((modulo, index) => {

        const abierto = moduloAbierto === index;

        const card = document.createElement("div");
        card.classList.add("module-card");

        card.innerHTML = `
            <div class="module-header" onclick="toggleModulo(${index})">
                <h3>
                    <i class="fas fa-folder-open"></i>
                    ${modulo.titulo}
                </h3>
            </div>

            <ul class="module-list" id="modulo-${index}" style="display:${abierto ? 'block' : 'none'};">
                ${
                    modulo.temas.map((tema, i) => `
                        <li onclick="abrirTema(${index}, ${i})">
                            <i class="fas fa-file-alt"></i>
                            ${tema.titulo}
                        </li>
                    `).join("")
                }
            </ul>

            ${
                usuario.rol === "profesor" ? `
                <div class="add-tema">
                    <input placeholder="Título del tema" id="titulo-${index}">
                    <button onclick="crearTema(${index})">
                        <i class="fas fa-plus"></i> Agregar
                    </button>
                </div>
                ` : ""
            }
        `;

        contenedor.appendChild(card);
    });
}


// ============================
// 🔽 TOGGLE
// ============================
function toggleModulo(index) {
    moduloAbierto = moduloAbierto === index ? null : index;
    renderEstructura();
}


// ============================
// 📂 ABRIR TEMA
// ============================
function abrirTema(modIndex, temaIndex) {

    const tema = contenidoGlobal.modulos[modIndex].temas[temaIndex];

    contenedor.innerHTML = `
        <div class="tema-detalle">

            <button onclick="renderEstructura()" class="btn-back">
                ← Volver
            </button>

            <h2>${tema.titulo}</h2>

            <div class="tema-body">
                <p>${tema.contenido || "Sin contenido aún..."}</p>

                ${
                    tema.archivo
                    ? `<a href="${tema.archivo}" target="_blank">📄 Abrir documento</a>`
                    : "<p style='opacity:0.6;'>Sin archivo adjunto</p>"
                }
            </div>

            ${
                usuario.rol === "profesor" ? `
                <div class="edit-tema">

                    <h4>Editar contenido</h4>

                    <textarea id="edit-contenido" placeholder="Escribe el contenido del tema...">${tema.contenido || ""}</textarea>

                    <input type="file" id="file-input">

                    <button onclick="guardarCambios(${modIndex}, ${temaIndex})">
                        💾 Guardar cambios
                    </button>

                    <button class="btn-delete" onclick="eliminarTema(${modIndex}, ${temaIndex})">
                        🗑️ Eliminar tema
                    </button>

                </div>
                ` : ""
            }

        </div>
    `;
}


// ============================
// ➕ CREAR TEMA
// ============================
async function crearTema(index) {

    const input = document.getElementById(`titulo-${index}`);
    const titulo = input.value.trim();

    if (!titulo) {
        alert("Escribe un título");
        return;
    }

    try {
        const res = await fetch(`http://localhost:3000/contenido/${cursoId}/modulo/${index}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                titulo,
                contenido: "",
                tipo: "documento",
                archivo: ""
            })
        });

        const data = await res.json();

        if (!res.ok) {
            console.error(data);
            alert("Error al guardar el tema");
            return;
        }

        input.value = "";

        // 🔥 CLAVE: abrir el módulo donde se creó
        moduloAbierto = index;

        await cargarEstructura();

    } catch (error) {
        console.error("ERROR:", error);
        alert("Error de conexión con el servidor");
    }
}


// ============================
// ✏️ EDITAR
// ============================
async function guardarCambios(modIndex, temaIndex) {

    const contenido = document.getElementById("edit-contenido").value;
    const fileInput = document.getElementById("file-input");

    let archivoURL = null;

    try {

        // ============================
        // 📤 SUBIR ARCHIVO (SI HAY)
        // ============================
        if (fileInput.files.length > 0) {

            const formData = new FormData();
            formData.append("archivo", fileInput.files[0]);

            const uploadRes = await fetch("http://localhost:3000/upload", {
                method: "POST",
                body: formData
            });

            const uploadData = await uploadRes.json();

            if (!uploadRes.ok) {
                alert("Error al subir archivo");
                return;
            }

            archivoURL = uploadData.url;
        }

        // ============================
        // 💾 GUARDAR EN BD
        // ============================
        const res = await fetch(`http://localhost:3000/contenido/${cursoId}/modulo/${modIndex}/tema/${temaIndex}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                contenido,
                archivo: archivoURL
            })
        });

        const data = await res.json();

        if (!res.ok) {
            console.error(data);
            alert("Error al guardar cambios");
            return;
        }

        alert("✅ Cambios guardados correctamente");

        moduloAbierto = modIndex;
        await cargarEstructura();

    } catch (error) {
        console.error("ERROR:", error);
        alert("Error de conexión");
    }
}

//ELIMINAR TEMAS:
async function eliminarTema(modIndex, temaIndex) {

    const confirmacion = confirm("¿Seguro que quieres eliminar este tema?");

    if (!confirmacion) return;

    try {

        const res = await fetch(`http://localhost:3000/contenido/${cursoId}/modulo/${modIndex}/tema/${temaIndex}`, {
            method: "DELETE"
        });

        const data = await res.json();

        if (!res.ok) {
            console.error(data);
            alert("Error al eliminar");
            return;
        }

        alert("🗑️ Tema eliminado correctamente");

        moduloAbierto = modIndex;
        await cargarEstructura();

    } catch (error) {
        console.error("ERROR:", error);
        alert("Error de conexión");
    }
}

// ============================
// 🚪 LOGOUT
// ============================
function logout() {
    localStorage.removeItem("usuario");
}


// ============================
// 🚀 INIT
// ============================
cargarEstructura();

</script>

</body>
</html>
