<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tareas - SkillTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="tareas.css">
</head>

<body>

<div class="dashboard-container">

<div class="sidebar">
    <div>
        <div class="profile">
            <img src="https://i.pravatar.cc/150?img=12">
            <h3 id="nombreUsuario"></h3>
            <p id="rolUsuario"></p>
        </div>

        <ul class="nav-links">
            <li><a href="../mis-cursos/mis-cursos.html"><i class="fas fa-arrow-left"></i> Volver</a></li>
            <li><a href="../mis-cursos/datos-curso.html"><i class="fas fa-stream"></i> Contenido</a></li>
            <li><a href="#" class="active"><i class="fas fa-tasks"></i> Tareas</a></li>
        </ul>
    </div>

    <div class="logout">
        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
    </div>
</div>

<div class="main-content">

<div class="topbar">
    <h1><i class="fas fa-tasks"></i> Tareas del Curso</h1>

    <button id="btnCrear" class="primary-btn" style="display:none;" onclick="mostrarForm()">
        <i class="fas fa-plus"></i> Nueva tarea
    </button>
</div>

<!-- FILTROS -->
<div class="filters">
    <button onclick="cargarTareas()">Activas</button>
    <button onclick="filtrar('entregado')">Entregadas</button>
    <button onclick="filtrar('vencida')">Vencidas</button>
</div>

<!-- FORM -->
<div id="formCrear" class="form-box" style="display:none;">
    <h3>Nueva tarea</h3>

    <input type="text" id="titulo" placeholder="Título">
    <textarea id="descripcion" placeholder="Descripción"></textarea>
    <input type="date" id="fecha">

    <div class="form-actions">
        <button class="primary-btn" onclick="crearTarea()">Guardar</button>
        <button class="secondary-btn" onclick="cancelar()">Cancelar</button>
    </div>
</div>

<!-- LISTA -->
<div class="tasks-container" id="listaTareas"></div>

</div>
</div>

<script>
const usuario = JSON.parse(localStorage.getItem("usuario"));
const cursoId = localStorage.getItem("cursoId");

if (!usuario) window.location.href = "../login/login.html";

document.getElementById("nombreUsuario").innerText = usuario.nombre;
document.getElementById("rolUsuario").innerText = usuario.rol;

if(usuario.rol === "profesor"){
    document.getElementById("btnCrear").style.display = "block";
}

let tareas = [];
let tareasOriginales = [];
let entregas = [];

/* =========================
   CARGAR TAREAS
========================= */
async function cargarTareas(){

    try{

        const res = await fetch(`http://localhost:3000/tareas/${cursoId}`);
        tareas = await res.json();
        tareasOriginales = [...tareas];

        if(usuario.rol === "estudiante"){
            const res2 = await fetch(`http://localhost:3000/entregas/${usuario.id}`);
            entregas = await res2.json();
        }

        render();

    }catch(error){
        console.error("Error cargando tareas:", error);
        alert("Error al cargar tareas");
    }
}

/* =========================
   RENDER
========================= */
function render(){

    const cont = document.getElementById("listaTareas");
    cont.innerHTML = "";

    if(tareas.length === 0){
        cont.innerHTML = `<p style="color:#cbd5ff;">No hay tareas disponibles.</p>`;
        return;
    }

    const hoy = new Date();

    tareas.forEach(t => {

        let estado = "pendiente";
        const entregada = entregas.find(e => e.tareaId === t._id);

        if(entregada) estado = "entregado";
        else if(new Date(t.fechaLimite) < hoy) estado = "vencida";

        cont.innerHTML += `
        <div class="task-card ${estado}">
            
            <div class="task-header">
                <h3>${t.titulo}</h3>
                <span class="status ${estado}">
                    ${estado.toUpperCase()}
                </span>
            </div>

            <div class="task-body">
                <p>${t.descripcion}</p>
                <p><i class="fas fa-calendar-alt"></i> ${new Date(t.fechaLimite).toLocaleDateString()}</p>
            </div>

            <div class="task-footer">

                ${
                    usuario.rol === "estudiante" && estado === "pendiente"
                    ? `<input type="file" class="file-input" onchange="subirArchivo(event,'${t._id}')">`
                    : ""
                }

                ${
                    estado === "entregado"
                    ? `<button class="secondary-btn"><i class="fas fa-check"></i> Entregado</button>`
                    : estado === "vencida"
                    ? `<button class="disabled-btn"><i class="fas fa-lock"></i> Cerrada</button>`
                    : ""
                }

            </div>

        </div>
        `;
    });
}

/* =========================
   SUBIR ARCHIVO
========================= */
async function subirArchivo(e, tareaId){

    try{

        const file = e.target.files[0];

        if(!file){
            alert("Selecciona un archivo");
            return;
        }

        const formData = new FormData();
        formData.append("archivo", file);

        const upload = await fetch("http://localhost:3000/upload",{
            method:"POST",
            body: formData
        });

        const data = await upload.json();

        await fetch("http://localhost:3000/entregas",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
                tareaId,
                estudianteId: usuario.id,
                archivo: data.url
            })
        });

        alert("✅ Tarea entregada correctamente");
        cargarTareas();

    }catch(error){
        console.error("Error subiendo archivo:", error);
        alert("Error al subir archivo");
    }
}

/* =========================
   CREAR TAREA (PROFESOR)
========================= */
async function crearTarea(){

    try{

        const titulo = document.getElementById("titulo").value.trim();
        const descripcion = document.getElementById("descripcion").value.trim();
        const fecha = document.getElementById("fecha").value;

        if(!titulo || !descripcion || !fecha){
            alert("Completa todos los campos");
            return;
        }

        await fetch("http://localhost:3000/tareas",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
                cursoId,
                titulo,
                descripcion,
                fechaLimite: fecha,
                usuarioId: usuario.id
            })
        });

        cancelar();
        cargarTareas();

    }catch(error){
        console.error("Error creando tarea:", error);
        alert("Error al crear tarea");
    }
}

/* =========================
   UI FORM
========================= */
function mostrarForm(){
    document.getElementById("formCrear").style.display = "block";
}

function cancelar(){
    document.getElementById("formCrear").style.display = "none";

    // limpiar campos
    document.getElementById("titulo").value = "";
    document.getElementById("descripcion").value = "";
    document.getElementById("fecha").value = "";
}

/* =========================
   FILTROS (FIX IMPORTANTE)
========================= */
function filtrar(tipo){

    const hoy = new Date();

    const filtradas = tareasOriginales.filter(t => {

        const entregada = entregas.find(e => e.tareaId === t._id);

        if(tipo === "entregado") return entregada;
        if(tipo === "vencida") return !entregada && new Date(t.fechaLimite) < hoy;

        return true;
    });

    tareas = filtradas;
    render();
}

/* =========================
   LOGOUT
========================= */
function logout(){
    localStorage.removeItem("usuario");
    window.location.href = "../login/login.html";
}

/* =========================
   INIT
========================= */
cargarTareas();
</script>

</body>
</html>
