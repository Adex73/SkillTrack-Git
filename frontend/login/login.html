<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - SkillTrack</title>
<link rel="stylesheet" href="/login/login.css">
</head>
<body>

<input type="checkbox" id="toggle">

<div class="container">

    <!-- LOGIN -->
    <div class="form-container login-container">
        <form id="formLogin">
            <h1>Iniciar Sesión</h1>
            <input type="email" id="emailLogin" placeholder="Correo" required>
            <input type="password" id="passwordLogin" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
            <label for="toggle" class="switch">¿No tienes cuenta? Registrarme</label>
            <p id="mensajeLogin" style="margin-top:10px; color:red;"></p>
        </form>
    </div>

    <!-- REGISTER -->
    <div class="form-container register-container">
        <form id="formRegistro">
            <h1>Crear Cuenta</h1>
            <input type="text" id="nombre" placeholder="Nombre completo" required>
            <input type="email" id="emailRegistro" placeholder="Correo" required>
            <input type="password" id="passwordRegistro" placeholder="Contraseña" required>
            <button type="submit">Registrar</button>
            <label for="toggle" class="switch">Ya tengo cuenta</label>
            <p id="mensajeRegistro" style="margin-top:10px; color:red;"></p>
        </form>
    </div>

    <!-- PANEL IZQUIERDO CON IMAGEN -->
    <div class="overlay-container">
        <div class="overlay">
            <div class="overlay-panel overlay-left">
                <h1>¡Bienvenido de nuevo!</h1>
                <p>Ingresa tus datos para continuar</p>
            </div>

            <div class="overlay-panel overlay-right">
                <h1>Hola, amigo!</h1>
                <p>Regístrate para comenzar tu experiencia</p>
            </div>
        </div>
    </div>

</div>

<script>


// REGISTRO peticion......................................................................................................................................

document.getElementById("formRegistro").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nombre = document.getElementById("nombre").value;
    const email = document.getElementById("emailRegistro").value;
    const password = document.getElementById("passwordRegistro").value;

    try {
        const res = await fetch("/registro", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nombre, email, password })
        });

        const data = await res.json();

        if (res.ok) {
            document.getElementById("mensajeRegistro").style.color = "lightgreen";
            document.getElementById("mensajeRegistro").innerText = data.mensaje;
        } else {
            document.getElementById("mensajeRegistro").innerText = data.error;
        }

    } catch (error) {
        document.getElementById("mensajeRegistro").innerText = "Error de conexión con el servidor";
    }
});



// LOGIN peticion......................................................................................................................................

document.getElementById("formLogin").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("emailLogin").value;
    const password = document.getElementById("passwordLogin").value;

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
            document.getElementById("mensajeLogin").style.color = "lightgreen";
            document.getElementById("mensajeLogin").innerText = data.mensaje;

            // 🔥 Guardar usuario en localStorage (temporal)
            localStorage.setItem("usuario", JSON.stringify(data.usuario));

            // Redirigir al dashboard
            setTimeout(() => {
                window.location.href = "../index/index.html";
            }, 1000);

        } else {
            document.getElementById("mensajeLogin").innerText = data.error;
        }

    } catch (error) {
        document.getElementById("mensajeLogin").innerText = "Error de conexión con el servidor";
    }
});

</script>

</body>
</html>
