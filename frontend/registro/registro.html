<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Usuarios - SkillTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="registro.css">
</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div>
            <div class="profile">
                <img src="https://i.pravatar.cc/150?img=15" alt="Usuario">
                <h3>Administrador</h3>
                <p style="color:#cbd5ff; font-size:13px;">Panel Administrativo</p>
            </div>

            <ul class="nav-links">
                <li><a href="../index/index.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="../registro/registro.html" class="active"><i class="fas fa-users"></i> Usuarios</a></li>
                <li><a href="../universidades/universidades.html"><i class="fas fa-university"></i> Universidades</a></li>
                <li><a href="../carreras/carreras.html"><i class="fas fa-graduation-cap"></i> Carreras</a></li>
                <li><a href="../cursos/cursos.html"><i class="fas fa-book"></i> Cursos</a></li>
            </ul>
        </div>

        <div class="logout">
            <a href="../login/login.html"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <div class="topbar">
            <h1>Gestión de Usuarios</h1>
        </div>

        <!-- TARJETA FORMULARIO -->
        <div class="user-card">

            <h2>Registrar Nuevo Usuario</h2>

            <form id="registroForm">

                <div class="form-grid">

                    <div class="input-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="nombre" required>
                    </div>

                    <div class="input-group">
                        <label>Correo Universitario</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="input-group">
                        <label>Matrícula</label>
                        <input type="text" id="matricula">
                    </div>

                    <div class="input-group">
                        <label>Teléfono</label>
                        <input type="text" id="telefono">
                    </div>

                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" id="password" required>
                    </div>

                    <div class="input-group">
                        <label>Universidad</label>
                        <select id="universidad" required>
                            <option value="">Seleccione Universidad</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Carrera</label>
                        <select id="carrera" disabled required>
                            <option value="">Seleccione Carrera</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Rol</label>
                        <select id="rol">
                            <option value="estudiante">Estudiante</option>
                            <option value="profesor">Profesor</option>
                            <option value="administrador">Administrador</option>
                        </select>
                    </div>

                </div>

                <div class="button-container">
                    <button type="submit">
                        <i class="fas fa-user-plus"></i> Registrar Usuario
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

    const universidadSelect = document.getElementById("universidad");
    const carreraSelect = document.getElementById("carrera");

    // 🔹 CARGAR UNIVERSIDADES
    try {
        const response = await fetch("http://localhost:3000/universidades");
        const universidades = await response.json();

        universidades.forEach(u => {
            const option = document.createElement("option");
            option.value = u._id;
            option.textContent = u.nombre;
            universidadSelect.appendChild(option);
        });

    } catch (error) {
        console.error("Error cargando universidades:", error);
    }

    // 🔹 CUANDO CAMBIA UNIVERSIDAD → CARGAR CARRERAS
    universidadSelect.addEventListener("change", async () => {

        const universidadId = universidadSelect.value;

        carreraSelect.innerHTML = '<option value="">Seleccione Carrera</option>';

        if (!universidadId) {
            carreraSelect.disabled = true;
            return;
        }

        try {
            const response = await fetch(`http://localhost:3000/carreras/${universidadId}`);
            const carreras = await response.json();

            carreras.forEach(c => {
                const option = document.createElement("option");
                option.value = c._id;
                option.textContent = c.nombre;
                carreraSelect.appendChild(option);
            });

            carreraSelect.disabled = false;

        } catch (error) {
            console.error("Error cargando carreras:", error);
        }
    });

    // 🔹 REGISTRAR USUARIO
    document.getElementById("registroForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
            nombre: document.getElementById("nombre").value,
            email: document.getElementById("email").value,
            matricula: document.getElementById("matricula").value,
            telefono: document.getElementById("telefono").value,
            universidad: universidadSelect.value,
            carrera: carreraSelect.value,
            rol: document.getElementById("rol").value,
            password: document.getElementById("password").value
        };

        try {
            const response = await fetch("http://localhost:3000/registro", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (!response.ok) {
                alert(result.error);
                return;
            }

            alert("Usuario registrado correctamente");
            document.getElementById("registroForm").reset();
            carreraSelect.disabled = true;

        } catch (error) {
            alert("Error conectando con el servidor");
        }
    });

});
</script>

</body>
</html>
