<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Cursos - SkillTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="cursos.css">
</head>

<body>

<div class="dashboard-container">

    <div class="sidebar">
        <div>
            <div class="profile">
                <img src="https://i.pravatar.cc/150?img=15">
                <h3 id="nombreUsuario">Usuario</h3>
                <p id="rolUsuario" style="color:#cbd5ff; font-size:13px;">Rol</p>
            </div>

            <ul class="nav-links">
                <li><a href="../index/index.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="../registro/registro.html"><i class="fas fa-users"></i> Usuarios</a></li>
                <li><a href="../universidades/universidades.html"><i class="fas fa-university"></i> Universidades</a></li>
                <li><a href="../carreras/carreras.html"><i class="fas fa-graduation-cap"></i> Carreras</a></li>
                <li><a href="#" class="active"><i class="fas fa-book"></i> Cursos</a></li>
            </ul>
        </div>

        <div class="logout">
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>
    </div>

    <div class="main-content">

        <div class="topbar">
            <h1>Gestión de Cursos</h1>
        </div>

        <div class="content-grid">

            <!-- FORMULARIO -->
            <div class="card-box">
                <h2>Registrar Curso</h2>

                <form id="cursoForm">

                    <div class="input-group">
                        <label>Materia</label>
                        <input type="text" id="nombreMateria" required>
                    </div>

                    <div class="input-group">
                        <label>Profesor</label>
                        <select id="profesor" required></select>
                    </div>

                    <div class="input-group">
                        <label>Grupo</label>
                        <input type="text" id="grupo" required>
                    </div>

                    <div class="input-group">
                        <label>Carrera</label>
                        <select id="carrera" required></select>
                    </div>

                    <div class="input-group">
                        <label>Semestre</label>
                        <select id="semestre" required>
                            <option value="">Selecciona semestre</option>
                            <option value="1">Primero</option>
                            <option value="2">Segundo</option>
                            <option value="3">Tercero</option>
                            <option value="4">Cuarto</option>
                            <option value="5">Quinto</option>
                            <option value="6">Sexto</option>
                            <option value="7">Séptimo</option>
                            <option value="8">Octavo</option>
                            <option value="9">Noveno</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Universidad</label>
                        <select id="universidad" required></select>
                    </div>

                    <div class="input-group">
                        <label>Activo</label>
                        <select id="activo">
                          <option value="true">Activo</option>
                          <option value="false">Inactivo</option>
                        </select>
                    </div>

                    <button type="submit">
                        <i class="fas fa-plus-circle"></i> Registrar Curso
                    </button>

                </form>
            </div>

            <!-- LISTA -->
            <div class="card-box">
                <h2>Cursos Registrados</h2>
                <ul id="listaCursos" class="lista"></ul>
            </div>

        </div>

    </div>

</div>

<script>
// =======================
// USUARIO
// =======================
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario) {
    window.location.href = "../login/login.html";
}

document.getElementById("nombreUsuario").innerText = usuario.nombre;
document.getElementById("rolUsuario").innerText =
    usuario.rol.charAt(0).toUpperCase() + usuario.rol.slice(1);

function logout(){
    localStorage.removeItem("usuario");
    window.location.href = "../login/login.html";
}

// =======================
// CARGAS
// =======================

async function cargarProfesores() {
    const res = await fetch("http://localhost:3000/profesores");
    const data = await res.json();

    const select = document.getElementById("profesor");
    select.innerHTML = `<option value="">Selecciona un profesor</option>`;

    data.forEach(p => {
        select.innerHTML += `<option value="${p._id}">${p.nombre}</option>`;
    });
}

async function cargarUniversidades() {
    const res = await fetch("http://localhost:3000/universidades");
    const data = await res.json();

    const select = document.getElementById("universidad");
    select.innerHTML = `<option value="">Selecciona una universidad</option>`;

    data.forEach(u => {
        select.innerHTML += `<option value="${u._id}">${u.nombre}</option>`;
    });
}

async function cargarCarreras() {
    const res = await fetch("http://localhost:3000/carreras");
    const data = await res.json();

    const select = document.getElementById("carrera");
    select.innerHTML = `<option value="">Selecciona una carrera</option>`;

    data.forEach(c => {
        select.innerHTML += `<option value="${c._id}">${c.nombre}</option>`;
    });
}

// =======================
// CURSOS
// =======================

async function cargarCursos() {
    const res = await fetch("http://localhost:3000/cursos");
    const data = await res.json();

    const lista = document.getElementById("listaCursos");
    lista.innerHTML = "";

    data.forEach(c => {
        lista.innerHTML += `
        <li>
            <div>
                <strong>${c.nombre}</strong><br>
                ${c.carreraId?.nombre || "Sin carrera"} - ${c.universidadId?.nombre || "Sin universidad"}<br>
                Grupo ${c.grupo} | Semestre ${c.semestre}<br>
                Prof: ${c.profesorId?.nombre || "Sin profesor"}<br>
                Estado: ${c.activo ? "Activo" : "Inactivo"}
            </div>
            <button onclick="eliminarCurso('${c._id}')">
                <i class="fas fa-trash"></i>
            </button>
        </li>
        `;
    });
}

// =======================
// FORM
// =======================

document.getElementById("cursoForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const data = {
        nombre: document.getElementById("nombreMateria").value.trim(),
        grupo: document.getElementById("grupo").value.trim(),
        carreraId: document.getElementById("carrera").value,
        universidadId: document.getElementById("universidad").value,
        profesorId: document.getElementById("profesor").value,
        semestre: document.getElementById("semestre").value,
        activo: document.getElementById("activo").value === "true"
    };

    // VALIDACIÓN FRONT
    if (!data.nombre || !data.grupo || !data.carreraId || !data.universidadId || !data.profesorId || !data.semestre) {
        alert("Todos los campos son obligatorios");
        return;
    }

    const res = await fetch("http://localhost:3000/cursos",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(data)
    });

    const result = await res.json();
    alert(result.mensaje || result.error);

    document.getElementById("cursoForm").reset();
    cargarCursos();
});

// =======================
// DELETE
// =======================

async function eliminarCurso(id){
    if(!confirm("¿Eliminar curso?")) return;

    await fetch(`http://localhost:3000/cursos/${id}`,{ method:"DELETE" });
    cargarCursos();
}

// =======================
// INIT
// =======================

cargarProfesores();
cargarCarreras();
cargarUniversidades();
cargarCursos();

</script>

</body>
</html>
